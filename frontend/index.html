<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="Browse and search agent memories across Hermes profiles and MCP agentmemory sources. Vue 3 + FastAPI dashboard with i18n, semantic search, multi-profile view.">
  <meta property="og:title" content="Memory Viewer — Hermes Agent">
  <meta property="og:description" content="Unified memory dashboard for Hermes Agent and MCP agentmemory sources.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://example.com/">
  <title>Memory Viewer — Hermes Agent</title>
  <script>
    // Prevent dark-mode FOUC: apply theme before Vue mounts
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
