# Memory Viewer 配置文件
# 路径: /opt/data/memory-viewer/v2/memory-viewer.yaml

# 服务端口
port: 8501
host: "0.0.0.0"

# 记忆数据源
sources:
  # ── Hermes 内置 Memory（MEMORY.md / USER.md）──
  # 容器化部署：host 路径 /home/.hermes/memories 映射到容器内 /workspace/hermes-memories
  - name: hermes
    type: hermes
    enabled: true
    config:
      memories_dir: /workspace/hermes-memories

  # ── AgentMemory（MCP 记忆）──
  - name: agentmemory
    type: agentmemory
    enabled: true
    config:
      cache_path: /workspace/agentmemory/standalone.json

  # ── mem0 云端记忆（取消注释启用）──
  # 需要设置环境变量: export MEM0_API_KEY=your_key
  # - name: mem0
  #   type: mem0
  #   enabled: true
  #   config:
  #     api_key: ${MEM0_API_KEY}
  #     base_url: https://api.mem0.ai/v1

# Hermes profiles 目录
# 容器化部署：host 路径 /home/.hermes/profiles 映射到容器内 /workspace/hermes-profiles
hermes_profiles_dir: /workspace/hermes-profiles

# Hermes 全局 memory (MEMORY.md/USER.md)
# 容器化部署：host 路径 /home/.hermes/memories 映射到容器内 /workspace/hermes-memories
hermes_memories_dir: /workspace/hermes-memories

# AgentMemory cache
# 后端通过 fetch_agentmemory.py 周期从 /workspace/agentmemory/standalone.json (源数据)
# + agentmemory MCP 重建到 /workspace/data/cache/agentmemory.json
# 容器化部署：host 端 /opt/data/memory-viewer/v2/data -> /workspace/data (rw)
agentmemory_cache: /workspace/data/cache/agentmemory.json

# 缓存自动刷新间隔（分钟）
cache_refresh_interval: 30
