# Memory Viewer 配置文件
# 路径: /opt/data/memory-viewer/v2/memory-viewer.yaml

# 服务端口
port: 8501
host: "0.0.0.0"

# 记忆数据源
sources:
  # ── Hermes 内置 Memory（MEMORY.md / USER.md）──
  - name: hermes
    type: hermes
    enabled: true
    config:
      memories_dir: /opt/data

  # ── AgentMemory（MCP 记忆）──
  - name: agentmemory
    type: agentmemory
    enabled: true
    config:
      cache_path: /opt/data/.agentmemory/standalone.json

  # ── mem0 云端记忆（取消注释启用）──
  # 需要设置环境变量: export MEM0_API_KEY=your_key
  # - name: mem0
  #   type: mem0
  #   enabled: true
  #   config:
  #     api_key: ${MEM0_API_KEY}
  #     base_url: https://api.mem0.ai/v1

# Hermes profiles 目录
hermes_profiles_dir: /home/.hermes/profiles

# 缓存自动刷新间隔（分钟）
cache_refresh_interval: 30
